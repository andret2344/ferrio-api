# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  firebase_project_id: '%env(FIREBASE_PROJECT_ID)%'
  firebase_credentials: '%env(FIREBASE_CREDENTIALS)%'
  anthropic_api_key: '%env(ANTHROPIC_API_KEY)%'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      $firebaseProjectId: '%firebase_project_id%'
      $anthropicApiKey: '%anthropic_api_key%'

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'
      - '../src/Tests/'

  Psr\SimpleCache\CacheInterface:
    class: Symfony\Component\Cache\Psr16Cache
    arguments:
      - '@cache.app'

  Kreait\Firebase\Factory:
    arguments:
      - '%firebase_credentials%'
    factory: ['App\Factory\FirebaseFactory', 'create']

  Kreait\Firebase\Contract\Auth:
    factory: ['@Kreait\Firebase\Factory', 'createAuth']

  App\Controller\v3\UserControllerV3:
    arguments:
      $floatingSuggestionHandler: '@App\Handler\FloatingHolidaySuggestionHandler'
      $floatingErrorHandler: '@App\Handler\FloatingHolidayErrorHandler'
      $fixedSuggestionHandler: '@App\Handler\FixedHolidaySuggestionHandler'
      $fixedErrorHandler: '@App\Handler\FixedHolidayErrorHandler'
